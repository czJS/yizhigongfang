paths:
  # Absolute or app-relative paths to bundled binaries and models.
  script: pipelines/asr_translate_tts.py
  whispercpp_bin: bin/whisper-cli
  whispercpp_model: assets/models/lite_asr_whispercpp/ggml-small-q5_1.bin
  vad_model: assets/models/lite_asr_whispercpp/ggml-silero-v6.2.0.bin
  kokoro_model: assets/models/lite_tts_kokoro_onnx/kokoro-v1.0.onnx
  kokoro_voices: assets/models/lite_tts_kokoro_onnx/voices-v1.0.bin
  ffmpeg_bin: bin/ffmpeg
  models_root: assets/models
  tts_home: assets/models/tts
  outputs_root: outputs
  # 可选：为 Lite 主链指定一套独立 Python 运行时（例如支持 onnxruntime/kokoro 的 3.12 venv）。
  lite_runtime_python: .venv-lite-arm64/bin/python
  # HuggingFace/Transformers 离线缓存目录（相对于 repo 根目录）
  hf_cache: assets/models/common_cache_hf

defaults:
  sample_rate: 16000
  # 全离线模式：运行期禁止任何联网下载（HuggingFace/Transformers/Coqui等）。
  # 若本地缺模型，将直接报错提示你手动放置到 assets/models 下。
  offline: true
  # 轻量模式默认 TTS 使用 Kokoro ONNX（保持离线、CPU 友好，同时比旧 Piper 基线更自然）
  tts_backend: kokoro_onnx
  bilingual_srt: false
  whispercpp_beam_size: 5
  vad_enable: true
  vad_threshold: 0.5
  vad_min_dur: 0.18
  denoise: false
  dedupe: true
  max_sentence_len: 50
  allow_gpu: true
  allow_heavy_models: true
  min_sub_duration: 1.5
  tts_split_len: 100
  tts_speed_max: 1.15
  # 配音对齐变速方式：atempo=尽量不变声（推荐）；resample=改采样率（更快但更容易“变声”）
  tts_align_mode: atempo
  # 中译英普遍膨胀，给 lite 主链更充足但受控的时间预算。
  # 听感优先：靠“句内受控提速 + 成片整体慢放”闭环，不做尾部补帧。
  tts_plan_safety_margin: 0.02
  tts_sample_rate: 24000
  kokoro_voice: af_bella
  kokoro_language: en-us
  kokoro_speed: 1.0
  # Lite 主链固定策略：保持模型与解码策略不变，只减少单条调用开销。
  mt_batch_enable: true
  mt_batch_size: 8
  # Lite 主链固定策略：ASR 文本净化 + 规则修正 + 低成本清洗 + 坏句识别默认开启。
  asr_normalize_enable: true
  asr_normalize_dict: assets/asr_normalize/asr_zh_dict.json
  asr_glossary_fix_enable: true
  asr_low_cost_clean_enable: true
  asr_badline_detect_enable: true
  asr_same_pinyin_path: assets/zh_phrase/pycorrector_same_pinyin.txt
  asr_same_stroke_path: assets/zh_phrase/pycorrector_same_stroke.txt
  asr_project_confusions_path: assets/zh_phrase/asr_project_confusions.json
  asr_lexicon_path: assets/zh_phrase/chinese_xinhua_ci_2to4.txt
  asr_proper_nouns_path: assets/zh_phrase/thuocl_proper_nouns.txt
  # Lite 主链固定策略：Stage1 仅保留本地规则修正与低成本清洗，不再依赖任何本地小模型/Ollama。

  # 硬字幕擦除（原字幕烧录在画面里时使用，通用且可回退；默认关闭）
  erase_subtitle_enable: false
  erase_subtitle_method: auto            # auto|fill|blur|delogo
  erase_subtitle_coord_mode: ratio       # ratio|px
  erase_subtitle_x: 0.05
  erase_subtitle_y: 0.745
  erase_subtitle_w: 0.9
  erase_subtitle_h: 0.22
  erase_subtitle_blur_radius: 12

  # 硬字幕烧录样式（默认更“友好”：不遮脸、字号不过大）
  sub_font_name: Arial
  sub_font_size: 34
  sub_outline: 1
  sub_shadow: 0
  sub_margin_v: 24
  sub_alignment: 2   # 2=底部居中（ASS 对齐）

  # 字幕位置矩形（可选）：开启后，新字幕会在该矩形中居中排版（优先级高于 sub_alignment/sub_margin_v）。
  # 默认按 16:9 常见字幕安全区设置：左右各留约 5%，整体落在下三分之一。
  sub_place_enable: false
  sub_place_coord_mode: ratio
  sub_place_x: 0.05
  sub_place_y: 0.745
  sub_place_w: 0.9
  sub_place_h: 0.22

  # 成片对齐策略（听感优先）
  mux_sync_strategy: slow          # slow|freeze
  mux_slow_max_ratio: 1.18         # 最多整体慢放 18%，不给尾部补帧
  mux_slow_threshold_s: 0.05       # 音频比视频多出超过该秒数才触发

presets:
  normal:
    label: 普通
    hardware_hint: "CPU 4-8 线程 / 8-16GB / 无独显"
    asr_model: assets/models/lite_asr_whispercpp/ggml-small-q5_1.bin
    mt_model: assets/models/lite_mt_marian_opus_mt_zh_en
    # 默认使用本地 Kokoro ONNX（完全离线、CPU 友好、自然度优于旧 Piper 基线）。
    tts_backend: kokoro_onnx
    whispercpp_threads: 4
    whispercpp_beam_size: 5
    vad_enable: true
    max_sentence_len: 50
    bilingual_srt: false
  mid:
    label: 中端
    hardware_hint: "CPU 8-12 线程 / 16-32GB / GPU 4-8GB"
    asr_model: assets/models/lite_asr_whispercpp/ggml-small-q5_1.bin
    mt_model: assets/models/lite_mt_marian_opus_mt_zh_en
    tts_backend: kokoro_onnx
    whispercpp_threads: 8
    whispercpp_beam_size: 5
    vad_enable: true
    max_sentence_len: 50
    bilingual_srt: false
  high:
    label: 高端
    hardware_hint: "CPU ≥12 线程 / 32GB+ / GPU ≥8-12GB"
    asr_model: assets/models/lite_asr_whispercpp/ggml-small-q5_1.bin
    mt_model: assets/models/lite_mt_marian_opus_mt_zh_en
    tts_backend: kokoro_onnx
    whispercpp_threads: 8
    whispercpp_beam_size: 5
    vad_enable: true
    max_sentence_len: 45
    bilingual_srt: false

ui:
  api_base: http://127.0.0.1:5175
  polling_ms: 1200
  quality_teaser_only: true
  online_disabled: true

# 质量门禁阈值（公共能力，lite/quality/online 统一使用；前端只读展示，避免“看不见的规则”）
# 修改这里后：
# - 后端生成的 quality_report.json 门禁判定会随之变化（无需改代码）
# - 前端审校表格的实时红标阈值也会随之变化（无需改代码）
quality_gates:
  # 英文字幕中是否允许出现中文/全角字符（默认不允许：出现则硬失败）
  allow_cjk_in_english_srt: false
  # 单行最大字符数（超出则告警）
  max_chars_per_line: 80
  # 阅读速度上限：characters per second（超出则告警）
  max_cps: 20.0
  # 空行率上限（超过则告警）
  max_empty_ratio: 0.10
  # 输出视频截断门禁（同时超过秒数与比例才判为硬失败）
  max_truncation_s: 1.0
  max_truncation_ratio: 0.03

