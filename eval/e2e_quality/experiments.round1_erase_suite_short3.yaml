# Round 1: Hard subtitle erase (B-class) on short3
#
# This feature is inherently visual and cannot be reliably scored by E2E metrics.
# We run on short3 for faster manual verification.
baseline:
  name: baseline
  overrides: {}

experiments:
  erase_subtitle_on:
    overrides:
      erase_subtitle_enable: true

reuse:
  freeze_asr_for_non_asr_experiments: true
  method: baseline_asr



