# Round 1: TRA suite on golden9
#
# Goal: evaluate TRA sub-switches in a meaningful baseline context.
# We use a baseline that enables TRA + QE, then ablate each sub-switch independently.
baseline:
  name: tra_qe_base
  overrides:
    tra_enable: true
    qe_enable: true
    qe_mode: suspect

experiments:
  tra_json_on:
    overrides:
      tra_json_enable: true

  tra_auto_on:
    overrides:
      tra_auto_enable: true

reuse:
  freeze_asr_for_non_asr_experiments: true
  method: baseline_asr



