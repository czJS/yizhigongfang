paths:
  # Absolute or app-relative paths to bundled binaries and models.
  script: scripts/asr_translate_tts.py
  whispercpp_bin: bin/main
  ffmpeg_bin: bin/ffmpeg
  models_root: assets/models
  tts_home: assets/models/tts
  outputs_root: outputs

defaults:
  sample_rate: 16000
  bilingual_srt: true
  vad_enable: false
  vad_threshold: 0.6
  vad_min_dur: 1.5
  denoise: false
  dedupe: true
  max_sentence_len: 50
  allow_gpu: true
  allow_heavy_models: true

presets:
  normal:
    label: 普通
    hardware_hint: "CPU 4-8 线程 / 8-16GB / 无独显"
    asr_model: assets/models/ggml-small-q5_0.bin
    mt_model: Helsinki-NLP/opus-mt-zh-en
    tts_backend: coqui
    tts_model: tts_models/en/ljspeech/tacotron2-DDC
    tts_device: cpu
    vad_enable: false
    max_sentence_len: 50
    dedupe: true
    bilingual_srt: true
  mid:
    label: 中端
    hardware_hint: "CPU 8-12 线程 / 16-32GB / GPU 4-8GB"
    asr_model: assets/models/ggml-medium-q5_0.bin
    mt_model: Helsinki-NLP/opus-mt-zh-en
    tts_backend: coqui
    tts_model: tts_models/en/ljspeech/tacotron2-DDC
    tts_device: auto
    vad_enable: true
    max_sentence_len: 50
    dedupe: true
    bilingual_srt: true
  high:
    label: 高端
    hardware_hint: "CPU ≥12 线程 / 32GB+ / GPU ≥8-12GB"
    asr_model: assets/models/ggml-medium-q5_0.bin
    mt_model: facebook/nllb-200-distilled-600M
    tts_backend: coqui
    tts_model: tts_models/en/vctk/vits
    tts_device: auto
    vad_enable: true
    max_sentence_len: 45
    dedupe: true
    bilingual_srt: true

ui:
  api_base: http://127.0.0.1:5175
  polling_ms: 1200


