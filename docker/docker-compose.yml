name: yizhi

services:
  ollama:
    image: yizhi-ollama:0.17.6
    platform: linux/arm64
    pull_policy: never
    build:
      context: ..
      dockerfile: docker/Dockerfile.ollama
      args:
        OLLAMA_VERSION: "0.17.6"
    restart: unless-stopped
    ports:
      - "11434:11434"   # 宿主 http://localhost:11434
    volumes:
      - ollama:/root/.ollama
    environment:
      # CPU-only / weak-hardware stability profile:
      # - keep exactly one model resident
      # - disable per-model parallelism (parallel requests multiply context memory)
      # - extend load timeout because qwen3.5:9b cold-start is very slow on CPU
      # - keep model resident once loaded to avoid repeated cold boots
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_QUEUE=16
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_LOAD_TIMEOUT=15m
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0

  backend:
    image: yzh-backend:quality    # 请先 docker build -t yzh-backend:quality -f docker/Dockerfile .
    pull_policy: never
    platform: linux/amd64
    depends_on:
      - ollama
    ports:
      - "5175:5175"
    volumes:
      # IMPORTANT:
      # Use long-syntax bind mounts and DISABLE auto-create. If a path is wrong/missing,
      # docker compose should fail fast instead of silently creating empty folders under docker/.
      - type: bind
        source: ../configs
        target: /app/configs
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ../pipelines
        target: /app/pipelines
        bind:
          create_host_path: false
      - type: bind
        source: ../core
        target: /app/core
        bind:
          create_host_path: false
      - type: bind
        source: ../apps/backend/backend
        target: /app/backend
        bind:
          create_host_path: false
      - type: bind
        source: ../assets
        target: /app/assets
        bind:
          create_host_path: false
      - type: bind
        source: ${HOME}/.cache/huggingface/hub
        target: /app/assets/models/common_cache_hf
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ../eval
        target: /app/eval
        bind:
          create_host_path: false
      - type: bind
        source: ../docs
        target: /app/docs
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ../outputs
        target: /app/outputs
        bind:
          create_host_path: false
      # （可选）外置金标目录：你的机器上是 /Users/chengzheng/Desktop/金标准
      # 这样容器内可用路径统一为 /app/golden_videos/*.mp4 / *.srt / *.srt_en
      # - /Users/chengzheng/Desktop/金标准:/app/golden_videos:ro
    environment:
      - YGF_LLM_ENDPOINT=http://host.docker.internal:11434/v1
      - YGF_PHRASE_LLM_ENDPOINT=http://host.docker.internal:11434/v1
      - PYTHONPATH=/app
      # 质量模式：使用 quality.yaml 作为主配置
      - CONFIG_PATH=/app/configs/quality.yaml
      # whisper.cpp (whisper-cli) 依赖 libwhisper/libggml；piper 依赖在 /app/bin/piper
      - LD_LIBRARY_PATH=/app/bin:/app/bin/piper
    # Ensure OpenCC is available for Traditional->Simplified conversion in lite mode.
    # (Some existing local images may not include it; install only if missing.)
    command:
      - bash
      - -lc
      - |
        python -c "import opencc, kokoro_onnx" 2>/dev/null || python -m pip install --no-cache-dir opencc-python-reimplemented==0.1.7 kokoro-onnx==0.5.0
        exec python -m backend.app

  # Long-running evaluation orchestrator (Round1 one-job).
  # Runs fully inside Docker and will keep running even if you close your terminal/IDE.
  onejob:
    profiles: ["eval"]
    image: yzh-backend:quality
    pull_policy: never
    platform: linux/amd64
    depends_on:
      - ollama
      - backend
    restart: "no"
    volumes:
      - type: bind
        source: ../configs
        target: /app/configs
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ../pipelines
        target: /app/pipelines
        bind:
          create_host_path: false
      - type: bind
        source: ../apps/backend/backend
        target: /app/backend
        bind:
          create_host_path: false
      - type: bind
        source: ../assets
        target: /app/assets
        bind:
          create_host_path: false
      - type: bind
        source: ${HOME}/.cache/huggingface/hub
        target: /app/assets/models/common_cache_hf
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ../eval
        target: /app/eval
        bind:
          create_host_path: false
      - type: bind
        source: ../docs
        target: /app/docs
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ../outputs
        target: /app/outputs
        bind:
          create_host_path: false
      # - /Users/chengzheng/Desktop/金标准:/app/golden_videos:ro
    environment:
      - YGF_LLM_ENDPOINT=http://host.docker.internal:11434/v1
      - YGF_PHRASE_LLM_ENDPOINT=http://host.docker.internal:11434/v1
      - PYTHONPATH=/app
      - CONFIG_PATH=/app/configs/quality.yaml
      - LD_LIBRARY_PATH=/app/bin:/app/bin/piper
    command:
      - bash
      - -lc
      - |
        PYTHONUNBUFFERED=1 python /app/pipelines/tools/run_round1_onejob_impl.py \
          --poll-s 60 \
          --bootstrap-iters 2000 \
          --retry-rounds 2 \
          --retry-sleep-s 60 \
          --round15-enable \
          --progress-json /app/outputs/eval/round1_onejob_progress.json \
          --log-file /app/outputs/eval/round1_onejob.log

  # Round2 combos runner: waits for onejob to finish, then runs 5-combo full delivery on golden9 and writes report.
  round2:
    profiles: ["eval"]
    image: yzh-backend:quality
    pull_policy: never
    platform: linux/amd64
    depends_on:
      - ollama
      - backend
    restart: unless-stopped
    volumes:
      - type: bind
        source: ../configs
        target: /app/configs
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ../pipelines
        target: /app/pipelines
        bind:
          create_host_path: false
      - type: bind
        source: ../apps/backend/backend
        target: /app/backend
        bind:
          create_host_path: false
      - type: bind
        source: ../assets
        target: /app/assets
        bind:
          create_host_path: false
      - type: bind
        source: ${HOME}/.cache/huggingface/hub
        target: /app/assets/models/common_cache_hf
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ../eval
        target: /app/eval
        bind:
          create_host_path: false
      - type: bind
        source: ../docs
        target: /app/docs
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ../outputs
        target: /app/outputs
        bind:
          create_host_path: false
      # - /Users/chengzheng/Desktop/金标准:/app/golden_videos:ro
    environment:
      - YGF_LLM_ENDPOINT=http://host.docker.internal:11434/v1
      - YGF_PHRASE_LLM_ENDPOINT=http://host.docker.internal:11434/v1
      - PYTHONPATH=/app
      - CONFIG_PATH=/app/configs/quality.yaml
      - LD_LIBRARY_PATH=/app/bin:/app/bin/piper
    command:
      - bash
      - -lc
      - |
        PYTHONUNBUFFERED=1 python /app/pipelines/tools/run_round2_combos_impl.py \
          --poll-s 120 \
          --bootstrap-iters 2000

  frontend:
    image: node:20
    pull_policy: if_not_present
    # v2: frontend source moved to apps/desktop (keep docker dev aligned with packaging layout)
    working_dir: /app/apps/desktop
    volumes:
      - type: bind
        source: ..
        target: /app
        bind:
          create_host_path: false
      # IMPORTANT: don't let Linux container write node_modules onto macOS host.
      # Otherwise Electron binary becomes Linux ELF and can't be spawned on macOS (errno -8).
      - desktop_node_modules:/app/apps/desktop/node_modules
    ports:
      - "5176:5174"  # 宿主访问 http://localhost:5176
    # 容器内不运行 Electron（需要桌面环境且依赖宿主平台二进制），只运行 Web 前端（Vite）
    command: ["bash", "-lc", "npm install && VITE_API_BASE=http://localhost:5175 npm run dev:docker"]

volumes:
  desktop_node_modules:
  ollama:

